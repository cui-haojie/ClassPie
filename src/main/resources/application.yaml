springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

# AI 辅助（OpenAI 兼容接口，如 OpenAI / DeepSeek / 通义等）
classpi:
  auth:
    enabled: true
  jwt:
    secret: classpi-dev-secret-change-in-production-min-32-chars!!
    expire-hours: 72
  ai:
    enabled: false
    api-key: ${AI_API_KEY:}
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini
    timeout-seconds: 60
